<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stateful y Stateless</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f4efe6, #d8e2dc);
            color: #1f2933;
        }
        .card {
            width: min(420px, 92vw);
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 18px 45px rgba(31, 41, 51, 0.16);
        }
        h1 {
            margin-top: 0;
            font-size: 1.9rem;
        }
        p {
            color: #52606d;
        }
        form {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        input {
            padding: 0.9rem 1rem;
            border: 1px solid #bcccdc;
            border-radius: 12px;
            font-size: 1rem;
        }
        button {
            padding: 0.9rem 1rem;
            border: 0;
            border-radius: 12px;
            background: #0f766e;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .error {
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            background: #ffe3e3;
            color: #9b1c1c;
        }
        .hint {
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        code {
            background: #e4f1ee;
            padding: 0.1rem 0.35rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>Componente Stateful</h1>
        <p>Inicia sesión para entrar al dashboard protegido por sesión.</p>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <p class="hint">La API pública stateless estará disponible en <code>/api/products/</code>.</p>
    </section>
</body>
</html>
